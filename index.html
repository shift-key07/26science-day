<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>병렬처리 미로 생성기 - 실시간 다중 협업형</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 캔버스 터치 스크롤 방지 */
        canvas { touch-action: none; }
        
        /* 썸네일 배경 설정 */
        .maze-cell {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800">

    <div id="toastContainer" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <div class="max-w-6xl mx-auto px-4 py-10 flex flex-col items-center">
        <div class="text-center mb-2">
            <h1 class="text-3xl font-bold inline-block">미로 맵 생성 대시보드 (6x4)</h1>
            <span class="ml-3 px-3 py-1 bg-green-100 text-green-700 text-sm font-bold rounded-full align-middle border border-green-300">🟢 실시간 동기화 켜짐</span>
        </div>
        <p class="text-gray-500 mb-8 text-center">각 번호를 클릭하여 해당 칸의 미로를 그리고 저장하세요.<br>다른 사용자가 편집 중인 구역은 자물쇠 아이콘이 표시되며 접근이 제한됩니다.</p>
        
        <div id="gridContainer" class="grid grid-cols-6 gap-2 w-full max-w-[1200px] bg-white p-4 rounded-xl shadow-lg border border-gray-200">
            </div>

        <div class="mt-8 flex flex-col items-center gap-3">
            <label class="flex items-center gap-2 text-gray-700 font-medium cursor-pointer bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-200 hover:bg-gray-50 transition-colors">
                <input type="checkbox" id="includeBorders" class="w-5 h-5 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500" checked>
                <span>다운로드 이미지에 구역 경계선(회색) 포함하기 <span class="text-red-500 text-sm">(알고리즘 적용 시 체크 해제 권장)</span></span>
            </label>
            <button id="downloadMergedBtn" class="px-8 py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg transition-transform transform hover:scale-105 flex items-center gap-2 text-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                전체 미로 병합해서 다운로드
            </button>
        </div>
    </div>

    <div id="editorModal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden transition-opacity duration-300">
        <div class="bg-white p-4 sm:p-6 rounded-2xl shadow-2xl flex flex-col items-center max-w-2xl w-full mx-4 sm:mx-0">
            <div class="w-full flex justify-between items-center mb-4">
                <h2 id="modalTitle" class="text-2xl font-bold">1번 칸 편집기</h2>
                <button id="closeModalBtn" class="text-gray-500 hover:text-red-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            
            <p class="text-sm text-gray-500 mb-4 text-center">초록색(입구)에서 빨간색(출구)으로 이어지는 길을 그려주세요.<br><span class="text-indigo-600 font-semibold mt-1 inline-block">마우스를 클릭한 채로 드래그하면 직선 벽이 그려집니다.</span></p>

            <div class="flex gap-3 mb-3 w-full justify-center">
                <button id="toolPenBtn" class="px-5 py-1.5 bg-indigo-600 text-white rounded-lg font-bold text-sm shadow-sm transition-colors border-2 border-indigo-600">✏️ 펜 (그리기)</button>
                <button id="toolEraserBtn" class="px-5 py-1.5 bg-white text-gray-700 rounded-lg font-bold text-sm shadow-sm transition-colors border-2 border-gray-200 hover:bg-gray-50">🧽 지우개</button>
            </div>

            <div class="relative border-4 border-gray-800 rounded shadow-inner w-full max-w-[400px] aspect-square mx-auto">
                <canvas id="editorCanvas" width="400" height="400" class="block w-full h-full cursor-crosshair bg-white"></canvas>
            </div>

            <div class="mt-6 flex flex-col gap-4 w-full items-center">
                <div id="validationMsg" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded-lg text-sm font-semibold shadow-sm animate-pulse w-full text-center">
                    ⚠️ 입구와 출구가 이어지지 않았습니다! 벽이 길을 막고 있는지 확인해주세요.
                </div>
                
                <div class="flex gap-4 w-full justify-center">
                    <button id="clearCellBtn" class="px-6 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold rounded-lg transition-colors">다시 그리기</button>
                    <button id="saveCellBtn" class="px-8 py-2 bg-green-500 hover:bg-green-600 text-white font-bold rounded-lg shadow transition-colors">이 칸 저장하기</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
